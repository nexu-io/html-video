spec_version: 1
id: frame-data-hbars
name: Data Horizontal Bars
description: >
  A native Remotion horizontal bar chart: bars grow from the left with spring
  physics, values roll up from 0, and items can be split into top/bottom groups
  with distinct colors. Pure system fonts, offline-safe.

engine: remotion
engine_version: ^4.0.0
source_entry: source/entry.ts
native:
  compositionId: DataHBars

category: data-viz
subcategory: bar-chart
tags: [data, chart, bars, horizontal, ranking, remotion, native, animated, kpi]

best_for:
  - "Ranked lists with top/bottom grouping"
  - "Department / team score comparison"
  - "Any horizontal bar chart where bars should animate in"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 30
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 10
  alpha: true
  audio:
    supported: false
    expected_inputs: []

inputs:
  schema:
    type: object
    required: [data]
    properties:
      data:
        type: object
        required: [items]
        properties:
          title: { type: "string", maxLength: 48, description: "Optional heading" }
          unit: { type: "string", maxLength: 4, description: "Optional suffix (e.g. pts, %)" }
          splitAt:
            type: "number"
            description: "Items before this index use accent (green); items at/after use accentSecondary (red). 0 = all primary."
          items:
            type: "array"
            maxItems: 20
            items:
              type: object
              required: [label, value]
              properties:
                label: { type: "string", maxLength: 24 }
                value: { type: "number" }
      background: { type: "string", description: "Default #0E0E10" }
      foreground: { type: "string", description: "Default #F5F5F2" }
      muted: { type: "string", description: "Default #888888" }
      accent: { type: "string", description: "Primary bar color. Default #22C55E" }
      accentSecondary: { type: "string", description: "Secondary bar color. Default #EF4444" }
  examples:
    - {"data": {"title": "Department Scores", "items": [{"label": "Engineering", "value": 92}, {"label": "Design", "value": 88}, {"label": "Marketing", "value": 76}, {"label": "Sales", "value": 71}, {"label": "Support", "value": 65}, {"label": "Operations", "value": 58}], "splitAt": 3, "unit": "pts"}}

license:
  spdx: Apache-2.0
  attribution_required: true
  redistribution_allowed: true
  commercial_use: true

provenance:
  origin:
    name: "none"
    kind: none
  via_skill:
    name: "Hermes Studio"
    author: "chenys"
    url: https://github.com/chenys/hermes-studio
    license: Apache-2.0
    source_file: "src/video/scenes.tsx (SceneDeptBars)"
  transformation: >
    Adapted from Hermes Studio SceneDeptBars. Generalized from KPI-specific
    data shape to generic items with configurable top/bottom split. Uses system
    fonts, responsive layout, spring bar growth, log scale fallback for
    extreme value spreads.

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-06-09
    notes: Native Remotion horizontal bar chart template with top/bottom grouping.

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 5
    render_wall_clock_sec: 45
    machine: "M2 MacBook Air"
