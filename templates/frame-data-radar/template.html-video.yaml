spec_version: 1
id: frame-data-radar
name: Data Radar Chart
description: >
  A native Remotion radar/spider chart: concentric grid rings, axis lines
  with labels, a spring-animated data polygon with fill, and per-axis score
  labels. Optional warn threshold highlights weak axes. Pure system fonts.

engine: remotion
engine_version: ^4.0.0
source_entry: source/entry.ts
native:
  compositionId: DataRadar

category: data-viz
subcategory: radar
tags: [data, chart, radar, spider, polygon, multi-dimension, remotion, native, animated]

best_for:
  - "Multi-dimensional performance profiling (e.g. balanced scorecard)"
  - "KPI dimension analysis with warn threshold"
  - "Comparing multiple aspects of a single entity"

not_for:
  - "More than ~8 axes (labels overlap)"
  - "Precise value comparison (use bars instead)"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 30
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 10
  alpha: true
  audio:
    supported: false
    expected_inputs: []

inputs:
  schema:
    type: object
    required: [data]
    properties:
      data:
        type: object
        required: [axes]
        properties:
          title: { type: "string", maxLength: 48, description: "Optional heading" }
          maxValue: { type: "number", description: "Scale maximum. Auto if omitted" }
          rings: { type: "number", description: "Grid ring count. Default 4" }
          axes:
            type: "array"
            minItems: 3
            maxItems: 8
            items:
              type: object
              required: [label, value]
              properties:
                label: { type: "string", maxLength: 16 }
                value: { type: "number" }
      background: { type: "string", description: "Default #0E0E10" }
      foreground: { type: "string", description: "Default #F5F5F2" }
      muted: { type: "string", description: "Default #888888" }
      accent: { type: "string", description: "Primary polygon color. Default #3B82F6" }
      warnThreshold: { type: "number", description: "Axes below this value tint accentWarn" }
      accentWarn: { type: "string", description: "Color for weak axes. Default #F97316" }
  examples:
    - {"data": {"title": "KPI Five Dimensions", "axes": [{"label": "Cost", "value": 0.28}, {"label": "Quality", "value": 0.45}, {"label": "Delivery", "value": 0.62}, {"label": "Flexibility", "value": 0.35}, {"label": "Innovation", "value": 0.50}], "maxValue": 0.8, "warnThreshold": 0.3}}

license:
  spdx: Apache-2.0
  attribution_required: true
  redistribution_allowed: true
  commercial_use: true

provenance:
  origin:
    name: "none"
    kind: none
  via_skill:
    name: "Hermes Studio"
    author: "chenys"
    url: https://github.com/chenys/hermes-studio
    license: Apache-2.0
    source_file: "src/video/scenes.tsx (SceneRadar)"
  transformation: >
    Adapted from Hermes Studio SceneRadar (SCPM KPI dashboard). Generalized
    from 5-dimension KPI to arbitrary axes, added configurable rings, warn
    threshold, and responsive layout. Uses system fonts.

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-06-09
    notes: Native Remotion radar chart template with warn threshold.

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 5
    render_wall_clock_sec: 45
    machine: "M2 MacBook Air"
